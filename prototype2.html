<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOTBOXD | Rate What You Smoke</title>
    <style>
        :root {
            /* Your original color palette, refined */
            --primary-bg: #8de0be;
            --card-bg: #ffffff;
            --accent-dark: #4f5351;
            --button-green: #74ae94;
            --text-main: #2c312f;
            --logo-cherry: #ff4d4d;
            --logo-wrap: #d2b48c;
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --primary-bg: #121413;
            --card-bg: #1e2120;
            --accent-dark: #8de0be;
            --button-green: #2d3b34;
            --text-main: #e0e0e0;
            --white: #2c312f;
            --shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        /* --- LOGO CSS (The "Joint" Design) --- */
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            text-decoration: none;
        }

        .joint-icon {
            position: relative;
            width: 45px;
            height: 12px;
            background: linear-gradient(to right, #f5f5f5 70%, var(--logo-wrap) 70%);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 2px;
            transform: rotate(-15deg);
        }

        .joint-icon::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 0;
            width: 6px;
            height: 100%;
            background: var(--logo-cherry);
            border-radius: 2px;
            box-shadow: 0 0 8px var(--logo-cherry);
        }

        .smoke-cloud {
            position: absolute;
            right: -15px;
            top: -20px;
            font-size: 20px;
            opacity: 0.8;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-5px) translateX(5px); }
        }

        .logo-text {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--accent-dark);
        }

        /* --- LAYOUT --- */
        header {
            background: var(--card-bg);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .search-container {
            flex-grow: 1;
            max-width: 500px;
            margin: 0 30px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1.5px solid var(--button-green);
            background: var(--primary-bg);
            color: var(--text-main);
            outline: none;
            font-size: 15px;
        }

        .nav-bar {
            background: var(--button-green);
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            overflow-x: auto;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .nav-btn.active, .nav-btn:hover {
            background: rgba(255,255,255,0.2);
            text-decoration: underline;
        }

        .category-scroll {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px 5%;
            flex-wrap: wrap;
        }

        .cat-tag {
            background: var(--card-bg);
            border: 1px solid var(--button-green);
            padding: 6px 16px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        /* --- CONTENT CARDS --- */
        main {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 18px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .card-inner {
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        .item-image {
            width: 120px;
            height: 120px;
            background: #eee;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #999;
            flex-shrink: 0;
        }

        .item-meta h2 { font-size: 22px; margin-bottom: 5px; }
        .item-meta p { font-size: 14px; color: #777; margin-bottom: 10px; }

        .star-rating { color: #f1c40f; font-size: 18px; }

        .review-snippet {
            background: rgba(0,0,0,0.02);
            padding: 15px 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            font-style: italic;
        }

        /* --- REVIEW FORM --- */
        #review-page {
            display: none;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .form-grid {
            display: grid;
            gap: 20px;
            margin-top: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: var(--primary-bg);
        }

        .submit-post {
            background: var(--button-green);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
        }

        .theme-toggle {
            background: var(--button-green);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            margin-left: 10px;
        }

    </style>
</head>
<body>

<header>
    <a href="#" class="logo-wrap" onclick="switchPage('top')">
        <div class="joint-icon">
            <span class="smoke-cloud">💨</span>
        </div>
        <span class="logo-text">HOTBOXD</span>
    </a>

    <div class="search-container">
        <input type="text" placeholder="Search strains, disposables, or users...">
    </div>

    <div style="display: flex; align-items: center;">
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        <div style="margin-left: 15px; font-size: 24px; cursor: pointer;">👤</div>
    </div>
</header>

<nav class="nav-bar">
    <button class="nav-btn active" id="btn-top" onclick="switchPage('top')">Top Ratings</button>
    <button class="nav-btn" id="btn-new" onclick="switchPage('new')">New Ratings</button>
    <button class="nav-btn" id="btn-trending" onclick="switchPage('trending')">What's Trending</button>
    <button class="nav-btn" id="btn-make" onclick="switchPage('make')">Make a Review</button>
</nav>

<div class="category-scroll" id="cat-scroll">
    <div class="cat-tag">FLOWER</div>
    <div class="cat-tag">CARTS</div>
    <div class="cat-tag">DISPOSABLE</div>
    <div class="cat-tag">PREROLLS</div>
    <div class="cat-tag">BEVERAGES</div>
    <div class="cat-tag">CONCENTRATES</div>
</div>

<main id="feed-content">
    <div id="ratings-list">
        <div class="product-card">
            <div class="card-inner">
                <div class="item-image">PRODUCT IMG</div>
                <div class="item-meta">
                    <div class="star-rating">★★★★★</div>
                    <h2>Pink Kush</h2>
                    <p>Indica • Pure Sunfarms</p>
                    <div class="cat-tag" style="display:inline-block; font-size: 10px;">FLOWER</div>
                </div>
            </div>
            <div class="review-snippet">
                "The terpene profile is insane on this batch. Heavy body high, perfect for late night." - @User123
            </div>
        </div>
    </div>

    <div id="review-page">
        <h1 style="margin-bottom: 10px;">Drop a Review</h1>
        <p style="color: #777; margin-bottom: 20px;">Share your experience with the community.</p>
        
        <div class="form-grid">
            <div class="input-group">
                <label>Item Name / Link</label>
                <input type="text" placeholder="Paste OCS link or type product name...">
            </div>
            <div class="input-group">
                <label>Category</label>
                <select>
                    <option>Flower</option>
                    <option>Carts</option>
                    <option>Disposable</option>
                    <option>Prerolls</option>
                </select>
            </div>
            <div class="input-group">
                <label>Your Rating</label>
                <select>
                    <option>5 Stars - Exceptional</option>
                    <option>4 Stars - Solid</option>
                    <option>3 Stars - Average</option>
                    <option>2 Stars - Disappointing</option>
                    <option>1 Star - Trash</option>
                </select>
            </div>
            <div class="input-group">
                <label>Review Details</label>
                <textarea rows="5" placeholder="Taste, smell, effects..."></textarea>
            </div>
            <div class="input-group">
                <label>Upload Photos</label>
                <input type="file" multiple>
            </div>
            <button class="submit-post">POST TO HOTBOXD</button>
        </div>
    </div>
</main>

<script>
    function switchPage(page) {
        const ratingsList = document.getElementById('ratings-list');
        const reviewPage = document.getElementById('review-page');
        const catScroll = document.getElementById('cat-scroll');
        const buttons = document.querySelectorAll('.nav-btn');

        // Reset active buttons
        buttons.forEach(btn => btn.classList.remove('active'));

        if (page === 'make') {
            ratingsList.style.display = 'none';
            catScroll.style.display = 'none';
            reviewPage.style.display = 'block';
            document.getElementById('btn-make').classList.add('active');
        } else {
            ratingsList.style.display = 'block';
            catScroll.style.display = 'flex';
            reviewPage.style.display = 'none';
            document.getElementById('btn-' + page).classList.add('active');
            
            // Simple logic to show different "content" based on tab
            if(page === 'trending') {
                ratingsList.innerHTML = '<h2 style="margin-bottom:15px">Trending Today</h2>' + ratingsList.innerHTML;
            }
        }
    }

    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        if (currentTheme === 'dark') {
            body.removeAttribute('data-theme');
        } else {
            body.setAttribute('data-theme', 'dark');
        }
    }
</script>

</body>
</html>
